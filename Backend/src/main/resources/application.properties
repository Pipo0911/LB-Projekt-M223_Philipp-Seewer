# Spring Boot Konfiguration
spring.datasource.url=jdbc:mysql://localhost:3306/steam_library?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=steam_user
spring.datasource.password=steam_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8080

# JWT Konfiguration
# Secret: Base64-kodierter 256-bit Key (min. 32 Zeichen vor Kodierung)
app.jwt.secret=bXlWZXJ5U2VjcmV0S2V5Rm9ySldUU3RlYW1MaWJyYXJ5TTIyM1BoaWxpcHA=
# Token-Gültigkeit: 24 Stunden in Millisekunden
app.jwt.expiration=86400000
