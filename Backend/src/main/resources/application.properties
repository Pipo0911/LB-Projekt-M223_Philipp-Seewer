# =====================================================================
# Spring Boot Konfiguration – Steam Library (M223)
# ---------------------------------------------------------------------
# Sensible Werte werden aus Umgebungsvariablen gelesen. Die Werte hinter
# dem Doppelpunkt sind nur Defaults fuer die lokale Entwicklung.
# Die DB-Variablennamen sind identisch zu denen im docker-run-Befehl und in
# der .env (DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD).
# Setzbare Umgebungsvariablen:
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD   – Datenbank-Verbindung
#   JWT_SECRET, JWT_EXPIRATION                        – Token-Konfiguration
#   CORS_ORIGINS                                      – erlaubte Frontend-Origins (Komma-getrennt)
#   SECURITY_LOG_LEVEL                                – Log-Level fuer Spring Security
# =====================================================================

# --- Datenbank ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:steam_library}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:steam_user}
spring.datasource.password=${DB_PASSWORD:steam_pass}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- Logging ---
# Standard INFO; fuer Security-Debugging SECURITY_LOG_LEVEL=DEBUG setzen.
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.level.ch.wiss.m223.steamlibrary=INFO

# --- JWT ---
# Secret: Base64-kodierter 256-bit Key. In Produktion zwingend ueber JWT_SECRET setzen!
app.jwt.secret=${JWT_SECRET:bXlWZXJ5U2VjcmV0S2V5Rm9ySldUU3RlYW1MaWJyYXJ5TTIyM1BoaWxpcHA=}
# Token-Gueltigkeit in Millisekunden (Default: 24 Stunden)
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# --- CORS ---
# Komma-getrennte Liste erlaubter Frontend-Origins.
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
