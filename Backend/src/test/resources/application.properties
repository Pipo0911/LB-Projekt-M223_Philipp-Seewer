# =====================================================================
# Test-Konfiguration: hermetische Integrationstests gegen H2
# ---------------------------------------------------------------------
# Ueberschreibt die MySQL-Verbindung der Haupt-Konfiguration, damit
# @SpringBootTest reproduzierbar und ohne laufende Datenbank laeuft.
# Das Schema wird pro Testlauf frisch aus den JPA-Entities erzeugt.
# =====================================================================
spring.datasource.url=jdbc:h2:mem:steamtest;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Feste Werte fuer Security/JWT in Tests
app.jwt.secret=bXlWZXJ5U2VjcmV0S2V5Rm9ySldUU3RlYW1MaWJyYXJ5TTIyM1BoaWxpcHA=
app.jwt.expiration=86400000
app.cors.allowed-origins=http://localhost:5173
